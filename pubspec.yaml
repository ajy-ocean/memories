name: memories
description: A modern, sleek, fast, and future-proof premium media and document gallery.
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  go_router: ^14.0.1
  photo_manager: ^3.0.0
  share_plus: ^7.2.1
  video_player: ^2.11.1
  permission_handler: ^11.3.1
  cross_file: ^0.3.4
  file_picker: ^8.0.0
  flutter_pdfview: ^1.3.2
  photo_manager_image_provider: ^2.2.0
  open_filex: ^4.7.0
  flutter_launcher_icons: ^0.14.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
